name: Readme Workflow

on:
  push:
    branches:
      - test/readme
  workflow_dispatch:

permissions:
  contents: write

jobs:
  readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # 🔥 Clone genie at correct location
      - name: Clone genie
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/clouddrove/genie.git /home/runner/genie

      # 🔍 Debug (optional, remove later)
      - name: Debug paths
        run: |
          pwd
          ls -la /home/runner/genie

      # 🔥 Generate README
      - name: Generate README
        run: make readme
